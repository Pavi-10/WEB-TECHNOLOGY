<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form with Display & Delete</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        form {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
        }

        input, textarea {
            width: 100%;
            margin: 5px 0 15px 0;
            padding: 8px;
        }

        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #ddd;
        }

        button {
            padding: 5px 10px;
        }
    </style>

    <script>
        function validateForm() {

            var fname = document.getElementById("fname").value;
            var lname = document.getElementById("lname").value;
            var password = document.getElementById("password").value;
            var email = document.getElementById("email").value;
            var mobile = document.getElementById("mobile").value;
            var address = document.getElementById("address").value;

            var namePattern = /^[A-Za-z]+$/;
            var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            var mobilePattern = /^[0-9]{10}$/;

            if (!namePattern.test(fname) || fname.length < 6) {
                alert("First Name must contain only alphabets and be at least 6 characters.");
                return false;
            }

            if (password.length < 6) {
                alert("Password must be at least 6 characters.");
                return false;
            }

            if (!emailPattern.test(email)) {
                alert("Invalid email format.");
                return false;
            }

            if (!mobilePattern.test(mobile)) {
                alert("Mobile number must contain exactly 10 digits.");
                return false;
            }

            if (lname === "" || address === "") {
                alert("Last Name and Address cannot be empty.");
                return false;
            }

            addData(fname, lname, email, mobile, address);
            document.getElementById("regForm").reset();
            return false; // prevent page refresh
        }

        function addData(fname, lname, email, mobile, address) {
            var table = document.getElementById("dataTable");

            var row = table.insertRow(-1);

            row.insertCell(0).innerHTML = fname;
            row.insertCell(1).innerHTML = lname;
            row.insertCell(2).innerHTML = email;
            row.insertCell(3).innerHTML = mobile;
            row.insertCell(4).innerHTML = address;
            row.insertCell(5).innerHTML =
                "<button onclick='deleteRow(this)'>Delete</button>";
        }

        function deleteRow(btn) {
            var row = btn.parentNode.parentNode;
            row.parentNode.removeChild(row);
        }
    </script>
</head>

<body>

<form id="regForm" onsubmit="return validateForm()">
    <h2>Registration Form</h2>

    First Name:
    <input type="text" id="fname">

    Last Name:
    <input type="text" id="lname">

    Password:
    <input type="password" id="password">

    E-mail:
    <input type="text" id="email">

    Mobile Number:
    <input type="text" id="mobile">

    Address:
    <textarea id="address"></textarea>

    <input type="submit" value="Register">
</form>

<table id="dataTable">
    <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Mobile</th>
        <th>Address</th>
        <th>Action</th>
    </tr>
</table>

</body>
</html>
